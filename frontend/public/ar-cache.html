<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>ARKON - Realistic Cache AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{overflow:hidden;background:#020617;font-family:sans-serif}
    #header{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(15,23,42,0.95);backdrop-filter:blur(10px);padding:15px 25px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(14,165,233,0.3)}
    #header h1{color:#38bdf8;font-size:20px;font-weight:bold}
    #back-btn{background:#0ea5e9;color:white;border:none;padding:10px 20px;border-radius:12px;cursor:pointer;font-size:14px;font-weight:bold;text-decoration:none}
    
    /* Tutorial Overlay */
    #tutorial{position:fixed;top:80px;left:20px;z-index:1000;background:rgba(15,23,42,0.8);padding:10px 15px;border-radius:10px;border-left:4px solid #0ea5e9;color:white;font-size:12px}
    
    #footer{position:fixed;bottom:0;left:0;right:0;z-index:9999;background:rgba(15,23,42,0.9);padding:15px;text-align:center;color:#94a3b8;font-size:14px}
    #camera-status { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; z-index: 1000; display: block; }
  </style>
</head>
<body>

<div id="header">
  <div>
    <h1>💾 Realistic Cache Hierarchy</h1>
    <p>Memory Bank & Cache Chip (Scale 5.0x)</p>
  </div>
  <a href="javascript:history.back()" id="back-btn">← KEMBALI</a>
</div>

<div id="tutorial">
  💡 <strong>INTERAKSI:</strong> Tap pada komponen untuk memunculkan <br>garis penunjuk dan penjelasan komponen!
</div>

<div id="camera-status">🎥 Mengakses Memori Fisik...</div>

<a-scene 
  embedded 
  arjs="sourceType: webcam; debugUIEnabled: false;" 
  vr-mode-ui="enabled: false"
  cursor="rayOrigin: mouse"
  raycaster="objects: .interactable">

  <a-marker preset="hiro">
    <!-- SUBSTRATE BASE (ENLARGED 5X) -->
    <a-box position="0 0 0" width="5.0" height="0.1" depth="3.5" color="#1e293b">
        <a-plane position="0 0.055 0" rotation="-90 0 0" width="4.8" height="3.3" color="#334155" opacity="0.4"></a-plane>
    </a-box>

    <!-- RAM MODULE (MAIN MEMORY) -->
    <a-entity id="ram-module" position="0 0.2 -1.0" class="interactable">
        <!-- PCB -->
        <a-box width="4.0" height="0.6" depth="0.1" color="#166534"></a-box>
        <!-- Memory Chips (8 black chips) -->
        <a-box color="#000000" width="0.35" height="0.4" depth="0.12" position="-1.5 0 0.02"></a-box>
        <a-box color="#000000" width="0.35" height="0.4" depth="0.12" position="-1.0 0 0.02"></a-box>
        <a-box color="#000000" width="0.35" height="0.4" depth="0.12" position="-0.5 0 0.02"></a-box>
        <a-box color="#000000" width="0.35" height="0.4" depth="0.12" position="0 0 0.02"></a-box>
        <a-box color="#000000" width="0.35" height="0.4" depth="0.12" position="0.5 0 0.02"></a-box>
        <a-box color="#000000" width="0.35" height="0.4" depth="0.12" position="1.0 0 0.02"></a-box>
        <a-box color="#000000" width="0.35" height="0.4" depth="0.12" position="1.5 0 0.02"></a-box>
        
        <!-- CALLOUT RAM -->
        <a-entity id="callout-ram" visible="false">
            <a-entity line="start: 0 0.3 0; end: 0 1.5 0; color: #ef4444; opacity: 1"></a-entity>
            <a-entity line="start: 0 1.5 0; end: 1.0 1.5 0; color: #ef4444; opacity: 1"></a-entity>
            <a-plane position="2.2 1.5 0" width="2.4" height="0.8" color="#1e293b" opacity="0.9">
                <a-text value="MAIN MEMORY (RAM)\nKapasitas besar, kecepatan rendah\nTempat penyimpanan utama data aktif." align="center" width="2.2" color="#ffffff" position="0 0 0.01" scale="0.4 0.4 0.4"></a-text>
            </a-plane>
        </a-entity>
    </a-entity>

    <!-- L3 CACHE CHIP (CENTRAL) -->
    <a-entity id="l3-chip" position="0 0.3 0" class="interactable">
        <a-box color="#334155" width="1.2" height="0.4" depth="1.2"></a-box>
        <a-box color="#fbbf24" width="1.3" height="0.05" depth="1.3" position="0 -0.2 0"></a-box> <!-- Pins -->
        
        <!-- CALLOUT L3 -->
        <a-entity id="callout-l3" visible="false">
            <a-entity line="start: 0 0.2 0; end: 0 1.2 0; color: #fbbf24; opacity: 1"></a-entity>
            <a-entity line="start: 0 1.2 0; end: -0.8 1.2 0; color: #fbbf24; opacity: 1"></a-entity>
            <a-plane position="-2.0 1.2 0" width="2.4" height="0.8" color="#1e293b" opacity="0.9">
                <a-text value="L3 CACHE\nShared Cache antar core.\nLebih lambat dari L1 tapi lebih besar." align="center" width="2.2" color="#ffffff" position="0 0 0.01" scale="0.4 0.4 0.4"></a-text>
            </a-plane>
        </a-entity>
    </a-entity>

    <!-- L1 CACHE (ON-TOP, SMALLEST) -->
    <a-entity id="l1-chip" position="0 0.8 0" scale="0.6 0.6 0.6" class="interactable">
        <a-box color="#ef4444" width="0.8" height="0.4" depth="0.8">
            <a-text value="L1" align="center" position="0 0.25 0" rotation="-90 0 0" color="#ffffff"></a-text>
        </a-box>
        <a-animation property="position" from="0 0.8 0" to="0 1.0 0" dur="1000" loop="true" dir="alternate"></a-animation>

        <!-- CALLOUT L1 -->
        <a-entity id="callout-l1" visible="false">
            <a-entity line="start: 0 0.2 0; end: 0 0.8 0; color: #38bdf8; opacity: 1"></a-entity>
            <a-entity line="start: 0 0.8 0; end: 1.0 0.8 0; color: #38bdf8; opacity: 1"></a-entity>
            <a-plane position="2.2 0.8 0" width="2.4" height="0.8" color="#1e293b" opacity="0.9">
                <a-text value="L1 CACHE\nTercepat, di dalam core.\nMenyimpan instruksi yang paling sering diakses." align="center" width="2.2" color="#ffffff" position="0 0 0.01" scale="0.4 0.4 0.4"></a-text>
            </a-plane>
        </a-entity>
    </a-entity>

    <!-- HIERARCHY FLOW ARROWS -->
    <a-entity position="0 0 0">
        <a-cylinder color="#38bdf8" radius="0.05" height="0.5" position="0 0.4 -0.5" rotation="90 0 0" opacity="0.5"></a-cylinder>
        <a-sphere position="0 0.4 -0.8" radius="0.05" color="#ffffff">
            <a-animation property="position" from="0 0.4 -0.8" to="0 0.4 -0.2" dur="2000" loop="true"></a-animation>
        </a-sphere>
    </a-entity>

  </a-marker>
  <a-entity camera></a-entity>
</a-scene>

<div id="footer">
  📷 Arahkan ke <strong>Marker Hiro</strong> | Tap komponen untuk anotasi cerdas
</div>

<script>
  // Interaction Logic for Callouts
  const components = {
    'ram-module': 'callout-ram',
    'l3-chip': 'callout-l3',
    'l1-chip': 'callout-l1'
  };

  Object.entries(components).forEach(([compId, calloutId]) => {
    const el = document.getElementById(compId);
    const callout = document.getElementById(calloutId);
    
    el.addEventListener('click', () => {
      // Toggle current callout
      const isVisible = callout.getAttribute('visible');
      
      // Hide all first for clean UI
      Object.values(components).forEach(id => {
        document.getElementById(id).setAttribute('visible', false);
      });
      
      // If it was hidden, show it
      if (!isVisible) {
        callout.setAttribute('visible', true);
      }
    });
  });

  window.addEventListener('camera-init', () => { document.getElementById('camera-status').style.display = 'none'; });
</script>
</body>
</html>
